<div class="book-card">

    <div>
      <h3>{{ book.title }}</h3>
  
      <p>Author: {{ book.author }}</p>
  
      <p>Genre: {{ book.genre }}</p>
  
      <p class="price">₱{{ book.price }}</p>
    </div>
  
    <button (click)="addToCart()">

        @if (!added) {
          Add To Cart
        }
      
        @else {
          Added ✓
        }
      
      </button>
  
  </div>
