<div class="book-card">

    <img [src]="book.image" alt="{{ book.title }}" />

    <div class="book-info">
      <h3>{{ book.title }}</h3>
  
      <p>Author: {{ book.author }}</p>
  
      <p>Genre: {{ book.genre }}</p>
  
      <p class="price">₱{{ book.price }}</p>
    </div>
  
    <button (click)="addToCart()">

        @if (!added) {
          Add To Cart
        }
      
        @else {
          Add again ✓
        }
      
      </button>
  
  </div>
