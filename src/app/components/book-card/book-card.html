<div class="book-card">

    <h3>{{ book.title }}</h3>
  
    <p>
      <strong>Author:</strong>
      {{ book.author }}
    </p>
  
    <p>
      <strong>Genre:</strong>
      {{ book.genre }}
    </p>
  
    <p class="price">
      ₱{{ book.price }}
    </p>
  
    <button (click)="addToCart()">
      Add To Cart
    </button>
  
  </div>
