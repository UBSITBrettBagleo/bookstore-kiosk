<h1 class="page-title">📚 Book Catalog</h1>

<p class="subtitle">
  Browse our collection and add books to your cart.
</p>

<div class="catalog-grid">

  @for (book of store.books(); track book.id) {

    <app-book-card
      [book]="book"
      (addBook)="store.addToCart($event)">
    </app-book-card>

  }

</div>
